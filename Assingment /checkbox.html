<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox Example</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
  <h3>Select Your Subjects</h3>
  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="html">
    <label class="form-check-label" for="html">HTML</label>
  </div>
  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="css">
    <label class="form-check-label" for="css">CSS</label>
  </div>
  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="js">
    <label class="form-check-label" for="js">JavaScript</label>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
