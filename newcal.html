<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: #222;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #main {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            width: 260px;
        }

        h1 {
            text-align: center;
        }

        #display {
            width: 100%;
            height: 40px;
            font-size: 20px;
            margin-bottom: 10px;
            text-align: right;
            padding: 5px;
            border-radius: 5px;
            border: none;
        }

        #btn-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .num {
            background: #555;
            color: white;
        }

        .operator {
            background: #00ff80;
        }

        .clear {
            background: #e7cc49;
        }

        .equal {
            background: #ccc;
        }

        .delete {
            background: yellow;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div id="main">
    <h1>Calculator</h1>

    <input type="text" id="display" readonly>

    <div id="btn-container">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="delete" onclick="deleteLast()">x</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="num" onclick="append('0')" style="grid-column: span 4;">0</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
